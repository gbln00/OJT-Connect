[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.gd"]

[phases.install]
cmds = [
    "curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer",
    "/usr/local/bin/composer install --optimize-autoloader --no-scripts --no-interaction --ignore-platform-req=ext-gd"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"