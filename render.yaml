services:
  - type: web
    name: ojt-connect
    runtime: docker
    plan: free
    preDeployCommand: "php artisan migrate --force && php artisan storage:link && php artisan optimize:clear"
    healthCheckPath: /up
    envVars:
      - key: PORT
        value: 8080

  - type: worker
    name: ojt-connect-worker
    runtime: docker
    plan: free
    startCommand: "php artisan queue:work database --sleep=3 --tries=1 --timeout=300"