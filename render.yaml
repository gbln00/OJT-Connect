services:
  - type: web
    name: ojt-connect
    runtime: php
    plan: free
    buildCommand: "composer install --optimize-autoloader --no-scripts --no-interaction && npm ci && npm run build && php artisan optimize:clear"
    startCommand: "php artisan serve --host=0.0.0.0 --port=$PORT"
    healthCheckPath: /up
    envVars:
      - key: PORT
        value: 8080

  - type: worker
    name: ojt-connect-worker
    runtime: php
    plan: free
    buildCommand: "composer install --optimize-autoloader --no-scripts --no-interaction"
    startCommand: "php artisan queue:work database --sleep=3 --tries=1 --timeout=300"